name: trilha_app
description: STWAY — aprenda a Bíblia em missões gamificadas.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1
  audioplayers: ^6.4.0
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  flutter_timezone: ^5.0.0
  uuid: ^4.5.1
  share_plus: ^13.2.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.3
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  google_sign_in: ^7.2.0
  sqflite: ^2.4.3
  path: ^1.9.1
  home_widget: ^0.9.3
  firebase_analytics: ^12.4.5
  firebase_crashlytics: ^5.2.6
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#081018"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/data/trails.json
    - assets/data/genesis_questions.json
    - assets/data/exodo_questions.json
    - assets/data/ot_questions.json
    - assets/data/nt_questions.json
    - assets/data/mission_studies.json
    - assets/data/bible_tb.json
    - assets/data/bible_jfaal.json
    - assets/data/bible_study.sqlite.gz
    - assets/sounds/
